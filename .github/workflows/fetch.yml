name: Scheduled Positron Daily Fetcher

on:
  schedule:
    # Everyday at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      run: |
        curl -Ls https://astral.sh/uv/install.sh | bash
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v7

    - name: Sync environment with uv
      run: uv sync

    - name: Run fetcher
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: uv run main.py

    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add -A
        DATE_UTC=$(date -u +'%Y-%m-%d')
        git commit -m "🔄 Auto-fetch update on $DATE_UTC" || echo "No changes"
        git push origin main

    - name: Install APT repository tools
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev

    - name: Build APT repository
      env:
        BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt
      run: uv run build_apt_repo.py --output "$RUNNER_TEMP/positron-pages" --base-url "$BASE_URL"

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ${{ runner.temp }}/positron-pages

    - name: Deploy GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
